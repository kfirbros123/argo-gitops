apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: new-app
  namespace: argocd
spec:
  project: my-project
  source:
    repoURL: https://github.com/kfirbros123/test-app.git
    targetRevision: HEAD
    path: helm-charts
    helm:
      releaseName: myapp
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
